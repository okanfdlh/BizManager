name: Build Windows Installer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Memungkinkan untuk di-trigger secara manual dari UI GitHub Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      shell: bash

    - name: Build Windows Installer (EXE & MSI)
      run: .\run.ps1 win-installer
      shell: powershell

    - name: Upload EXE Installer
      uses: actions/upload-artifact@v4
      with:
        name: BizManager-Windows-EXE
        path: build/compose/binaries/main/exe/
        if-no-files-found: warn

    - name: Upload MSI Installer
      uses: actions/upload-artifact@v4
      with:
        name: BizManager-Windows-MSI
        path: build/compose/binaries/main/msi/
        if-no-files-found: warn

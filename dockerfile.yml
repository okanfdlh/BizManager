FROM eclipse-temurin:21-jdk

WORKDIR /app

# Tools commonly needed by Gradle wrapper and native libs
RUN apt-get update \
    && apt-get install -y --no-install-recommends bash curl unzip git ca-certificates \
    && rm -rf /var/lib/apt/lists/*

# Keep Gradle cache in a known writable path
ENV GRADLE_USER_HOME=/home/gradle/.gradle

# Default command can be overridden by docker compose
CMD ["bash", "-lc", "./gradlew --version"]
